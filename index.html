<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thangadurai | Cloud DevOps Engineer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React and ReactDOM CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN to compile JSX in the browser -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [visibleLines, setVisibleLines] = useState([]);
            const [currentCommand, setCurrentCommand] = useState(0);

            const terminalData = [
                { type: 'command', text: 'root@td~ % whoami' },
                { 
                    type: 'output', 
                    text: (
                        <div className="mb-4">
                            <h1 className="text-2xl font-bold text-emerald-400 mb-1">Thangadurai</h1>
                            <p className="text-xl text-slate-300 font-semibold mb-2">🚀 Cloud DevOps Engineer</p>
                            <p className="text-slate-400 max-w-2xl leading-relaxed font-sans">
                                I began my career in IT as an IT Support Engineer and gradually transitioned into various infrastructure roles. 
                                Over time, I specialized in setting up and managing environments tailored to developers' needs—enabling them to build, test, and run software efficiently. 
                                Initially working with monolithic applications, I focused on ensuring stable, scalable, and reliable infrastructure aligned with business requirements.
                            </p>
                            <div className="mt-2 text-rose-500 font-mono animate-pulse font-bold">
                                🚨 SYSTEM MELTDOWN INITIATED 🚨
                            </div>
                        </div>
                    )
                },
                { type: 'command', text: "root@td~ % cat experience.log | grep 'relevant'" },
                {
                    type: 'output',
                    text: (
                        <div className="mb-4 space-y-2 font-mono">
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-emerald-500 pl-3 py-1 bg-slate-900/50">
                                <span className="text-emerald-400 font-bold">[2024 - 2025]</span>
                                <span className="text-slate-200">Senior Cloud DevOps Engineer <span className="text-sky-400">@ ADSK India Technologies Limited</span></span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-emerald-500 pl-3 py-1 bg-slate-900/50">
                                <span className="text-emerald-400 font-bold">[2022 - 2024]</span>
                                <span className="text-slate-200">Senior Engineer DevOps <span className="text-sky-400">@ Tesco Bank</span></span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-emerald-500 pl-3 py-1 bg-slate-900/50">
                                <span className="text-emerald-400 font-bold">[2019 - 2022]</span>
                                <span className="text-slate-200">Senior Software Systems Engineer <span className="text-sky-400">@ Sabre</span></span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-slate-700 pl-3 py-1">
                                <span className="text-slate-500">[2016 - 2019]</span>
                                <span className="text-slate-400">Senior Analyst @ Dell Technologies</span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-slate-700 pl-3 py-1">
                                <span className="text-slate-500">[2016 - 2016]</span>
                                <span className="text-slate-400">Technology Analyst @ Infosys Limited</span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-slate-700 pl-3 py-1">
                                <span className="text-slate-500">[2015 - 2016]</span>
                                <span className="text-slate-400">Service Delivery Consultant II @ HPE</span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-slate-700 pl-3 py-1">
                                <span className="text-slate-500">[2012 - 2015]</span>
                                <span className="text-slate-400">Senior Analyst @ Capco Technologies Private Limited</span>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:space-x-4 border-l-2 border-slate-700 pl-3 py-1">
                                <span className="text-slate-500">[2011 - 2012]</span>
                                <span className="text-slate-400">IT Support Engineer @ Allsec Technologies</span>
                            </div>
                        </div>
                    )
                },
                { type: 'command', text: 'root@td~ % cat skills.txt' },
                {
                    type: 'output',
                    text: (
                        <div className="mb-4 grid grid-cols-1 md:grid-cols-2 gap-3 bg-slate-900/40 p-4 rounded-lg border border-slate-800 font-sans">
                            <div><span className="text-amber-400 font-mono font-bold">🛠️ CI:</span> <span className="text-slate-300">Jenkins, GitHub Actions</span></div>
                            <div><span className="text-amber-400 font-mono font-bold">🚚 CD:</span> <span className="text-slate-300">Spinnaker, Ansible</span></div>
                            <div><span className="text-sky-400 font-mono font-bold">☁️ Cloud Wizard:</span> <span className="text-slate-300">AWS, Azure</span></div>
                            <div><span className="text-purple-400 font-mono font-bold">🧰 Virtualization:</span> <span className="text-slate-300">VMware ESXi, Microsoft Hyper-V</span></div>
                            <div><span className="text-cyan-400 font-mono font-bold">🐳 ☸️ Containers:</span> <span className="text-slate-300">Docker & Kubernetes</span></div>
                            <div><span className="text-emerald-400 font-mono font-bold">📜 IaC:</span> <span className="text-slate-300">Terraform IaC</span></div>
                            <div><span className="text-yellow-400 font-mono font-bold">🐚 Scripting:</span> <span className="text-slate-300">Bash, Python, YAML, JSON</span></div>
                            <div><span className="text-rose-400 font-mono font-bold">🔐 Secret Management:</span> <span className="text-slate-300">Vault, ParameterStore</span></div>
                            <div><span className="text-indigo-400 font-mono font-bold">🐘 DB:</span> <span className="text-slate-300">Aurora RDS, Postgres, Oracle 12.x</span></div>
                            <div><span className="text-orange-400 font-mono font-bold">🖥️ Monitoring:</span> <span className="text-slate-300">DataDog, Splunk</span></div>
                        </div>
                    )
                },
                { type: 'command', text: "env | grep 'non-toxic-ones'" },
                {
                    type: 'output',
                    text: (
                        <div className="mb-4 space-y-1 text-teal-400 font-mono">
                            <div>🔹 Scalability Mindset</div>
                            <div>🔹 Collaboration with SDLC</div>
                            <div>🔹 Good listener with active Learner</div>
                        </div>
                    )
                },
                { type: 'command', text: 'root@td~ % cat contacts.txt' },
                {
                    type: 'output',
                    text: (
                        <div className="mb-6 flex flex-wrap gap-4 font-sans">
                            <a href="https://linkedin.com/in/YOUR_USERNAME" target="_blank" rel="noreferrer" className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded transition font-medium flex items-center gap-2">
                                🔗 LinkedIn
                            </a>
                            <a href="https://github.com/YOUR_USERNAME" target="_blank" rel="noreferrer" className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded transition font-medium flex items-center gap-2">
                                🐙 GitHub
                            </a>
                        </div>
                    )
                },
                { type: 'command', text: 'root@td~ % ./deploy.sh' },
                {
                    type: 'output',
                    text: (
                        <div className="p-3 bg-emerald-950/40 border border-emerald-500/30 text-emerald-400 rounded font-mono animate-pulse">
                            🚀 Deploy Now! 🔄 Deploying application... Success! Live on GitHub Pages.
                        </div>
                    )
                }
            ];

            useEffect(() => {
                if (currentCommand < terminalData.length) {
                    const delay = terminalData[currentCommand].type === 'command' ? 700 : 400;
                    const timer = setTimeout(() => {
                        setVisibleLines((prev) => [...prev, terminalData[currentCommand]]);
                        setCurrentCommand((prev) => prev + 1);
                    }, delay);
                    return () => clearTimeout(timer);
                }
            }, [currentCommand]);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col justify-between font-sans selection:bg-emerald-500 selection:text-black">
                    <header className="border-b border-slate-900 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center space-x-2">
                            <div className="h-3 w-3 rounded-full bg-emerald-500 animate-ping" />
                            <span className="font-mono text-sm tracking-wider text-slate-400">thangadurai::portfolio</span>
                        </div>
                        <div className="text-xs text-slate-500 font-mono hidden sm:block">
                            STATUS: STABLE // ENV: PRODUCTION
                        </div>
                    </header>

                    <main className="flex-1 max-w-4xl w-full mx-auto p-4 md:p-8">
                        <div className="bg-slate-900 border border-slate-800 rounded-xl shadow-2xl overflow-hidden flex flex-col">
                            <div className="bg-slate-950 px-4 py-3 border-b border-slate-800 flex items-center space-x-2">
                                <div className="w-3 h-3 rounded-full bg-rose-500" />
                                <div className="w-3 h-3 rounded-full bg-amber-500" />
                                <div className="w-3 h-3 rounded-full bg-emerald-500" />
                                <span className="text-xs font-mono text-slate-500 pl-2">bash — experience.log</span>
                            </div>

                            <div className="p-6 font-mono text-sm md:text-base space-y-4 overflow-y-auto max-h-[75vh]">
                                {visibleLines.map((line, idx) => (
                                    <div key={idx} className="animate-fadeIn">
                                        {line.type === 'command' ? (
                                            <p className="text-amber-400 font-semibold">{line.text}</p>
                                        ) : (
                                            <div className="text-slate-300">{line.text}</div>
                                        )}
                                    </div>
                                ))}
                                
                                {currentCommand < terminalData.length && (
                                    <div className="inline-block w-2 h-4 bg-slate-400 animate-pulse ml-1" />
                                )}
                            </div>
                        </div>
                    </main>

                    <footer className="border-t border-slate-900 bg-slate-900/20 py-4 text-center text-xs text-slate-600 font-mono">
                        © {new Date().getFullYear()} Thangadurai. Terminal Engine Live.
                    </footer>
                </div>
            );
        }

        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
